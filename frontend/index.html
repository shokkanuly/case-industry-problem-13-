<!doctype html>
<html lang="ru" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Industrial Nervous System — Платформа цифровых двойников</title>
    <meta name="description" content="Edge-to-cloud платформа цифровых двойников для горно-металлургической отрасли. ИИ-мониторинг СИЗ, опасного поведения и единая архитектура для 15 индустриальных кейсов." />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: '#030303',
              foreground: '#f3f4f6',
              card: '#0a0a0d',
              primary: '#00a1c8',
              'primary-foreground': '#ffffff',
              secondary: '#0f0f12',
              'secondary-foreground': '#f3f4f6',
              muted: '#070708',
              'muted-foreground': '#9ca3af',
              success: '#008a22',
              warning: '#b58700',
              destructive: '#d41101',
              border: '#16161a',
              input: '#16161a',
              ring: '#00a1c8'
            },
            fontFamily: {
              sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
              mono: ['JetBrains Mono', 'Fira Code', 'monospace']
            }
          }
        }
      }
    </script>
    <style>
      /* Embed specific design helper classes from index.css */
      .glow-blue {
        box-shadow: 0 0 20px rgba(0, 161, 200, 0.12), 0 0 60px rgba(0, 161, 200, 0.04);
      }
      .glow-red {
        box-shadow: 0 0 20px rgba(212, 17, 1, 0.12), 0 0 60px rgba(212, 17, 1, 0.04);
      }
      .glow-green {
        box-shadow: 0 0 20px rgba(0, 138, 34, 0.12), 0 0 60px rgba(0, 138, 34, 0.04);
      }
      .grid-pattern {
        background-image: radial-gradient(rgba(0, 161, 200, 0.04) 1px, transparent 1px);
        background-size: 32px 32px;
      }
      .scan-line {
        background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 161, 200, 0.015) 2px, rgba(0, 161, 200, 0.015) 4px);
      }
      
      /* Custom Animation helpers */
      @keyframes pulse-glow-red {
        0%, 100% { box-shadow: 0 0 8px rgba(212, 17, 1, 0.1); }
        50% { box-shadow: 0 0 20px rgba(212, 17, 1, 0.25); }
      }
      @keyframes pulse-glow-blue {
        0%, 100% { box-shadow: 0 0 8px rgba(0, 161, 200, 0.1); }
        50% { box-shadow: 0 0 20px rgba(0, 161, 200, 0.25); }
      }
      .pulse-glow-red {
        animation: pulse-glow-red 2s infinite ease-in-out;
      }
      .pulse-glow-blue {
        animation: pulse-glow-blue 2.5s infinite ease-in-out;
      }
      
      /* Smooth fade & slide in transitions */
      .animate-slide-in {
        animation: slideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Hover zoom/lift class */
      .card-hover-effect {
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .card-hover-effect:hover {
        transform: translateY(-2px);
        border-color: rgba(0, 161, 200, 0.3) !important;
        box-shadow: 0 4px 20px rgba(0, 161, 200, 0.05);
      }
    </style>
  </head>
  <body class="bg-background text-foreground antialiased font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
